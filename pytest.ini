# pytest.ini
#
# 功能说明:
# - 统一 pytest marker 与采集配置，区分基础设施测试与产品测试。
# - 限定 pytest 只扫描仓库 `test` 目录，并避免同名测试文件按默认导入方式冲突。
#
# 使用示例:
# - pytest -m "not infra"
# - pytest -m infra -p no:cov
#
# 关联文件:
# - spec: spec/script/pytest_config.md
# - test: test/script/test_pytest_config.py
# - 功能实现: pytest.ini

[pytest]
markers =
    infra: 标记脚本与基础设施测试
    nn_lowering: 标记 nn_lowering 相关测试
    npu_demo: 标记 npu_demo 端到端或运行时相关测试
filterwarnings =
    default
testpaths =
    test
python_files =
    test_*.py
addopts = --import-mode=importlib
norecursedirs =
    wt-*
    tmp
    tmp/*
    tmp/**
    __pycache__
