# pyproject.toml
# 创建者: 小李飞刀
# 最后一次更改: 金铲铲大作战
#
# 功能说明:
# - 统一 pytest marker 与采集配置，区分基础设施测试与产品测试。
# - 限定 pytest 只扫描仓库 `test` 目录，并避免同名测试文件按默认导入方式冲突。
#
# 使用示例:
# - pytest -m "not infra"
# - pytest -m infra -p no:cov
#
# 关联文件:
# - spec: spec/script/pytest_config.md
# - test: test/script/test_pytest_config.py
# - 功能实现: pyproject.toml
# - 计划: ARCHITECTURE/plan/codebase_refactor_baseline_green_plan.md

[tool.pytest.ini_options]
markers = [
    "infra: 标记脚本与基础设施测试",
]
testpaths = ["test"]
addopts = ["--import-mode=importlib"]
norecursedirs = ["wt-*", "tmp", "tmp/*", "tmp/**", "__pycache__"]
